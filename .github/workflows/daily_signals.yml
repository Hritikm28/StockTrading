name: Daily Trading Signals

# Fully autonomous daily loop on GitHub's servers (laptop can be off):
#   1. Restore cached price data (data/stocks)
#   2. quick_update_data.py   -> fetch latest OHLCV (incremental, low rate-limit risk)
#   3. paper_trade_tracker.py -> grade past predictions + AUTO-CORRECT weights
#   4. daily_runner.py --quick-> run REAL multi_alpha_engine + 5 improvements
#   5. publish_signals.py     -> write signals/ files
#   6. commit signals + learning state (so corrections persist day-to-day)
#   7. save data cache for tomorrow
#
# Runs the SAME engine you run locally (multi_alpha_engine), NOT the old
# stripped-down cloud_daily_runner.py.

on:
  schedule:
    # 14:33 UTC = 20:03 IST — EVENING run, after market close. Two reasons:
    #   1. Data quality: NSE bhav copy (~18:00 IST), FII/DII flows (~16:30 IST)
    #      and same-day closes are all published by 20:00 IST, so signals use
    #      TODAY's official data instead of yesterday's.
    #   2. Timing: GitHub cron queues 2-5h on the free tier. A morning run
    #      lands mid-session (~12:00 IST); an evening run can be hours late
    #      and the email still arrives well before the next market open.
    - cron: '33 14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-signals
  cancel-in-progress: false

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute date key
        id: date
        run: echo "ymd=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Restore price-data cache
        uses: actions/cache@v4
        with:
          path: data/stocks
          # v2: deeper 800-day bootstrap (momentum needs 252 trading days).
          # Bumping the prefix forces a one-time deep re-seed, ignoring the
          # shallow v1 cache.
          key: stockdata-v3-${{ steps.date.outputs.ymd }}
          restore-keys: |
            stockdata-v3-

      - name: Restore earnings-data cache (PEAD alpha)
        uses: actions/cache@v4
        with:
          path: data/earnings_calendar
          key: earningsdata-v1-${{ steps.date.outputs.ymd }}
          restore-keys: |
            earningsdata-v1-

      - name: Install lean engine dependencies
        run: pip install -r requirements_engine.txt

      - name: Update market data (incremental, with one retry)
        run: |
          python quick_update_data.py || true
          # second pass retries only stocks still stale (cheap; smooths yfinance rate limits)
          python quick_update_data.py || true

      - name: Update earnings calendar (feeds PEAD alpha)
        run: python earnings_calendar.py --update || true

      - name: Grade past predictions + auto-correct weights
        run: python paper_trade_tracker.py --today || true

      - name: Kill-switch — disable alphas with decayed win rates
        run: python signal_decay_detector.py || true

      - name: Run real multi-alpha engine
        run: python daily_runner.py --quick

      - name: Publish signals
        run: python publish_signals.py

      - name: Build email summary
        run: |
          python email_summary.py
          echo "EMAIL_SUBJECT=$(cat email_subject.txt)" >> "$GITHUB_ENV"

      - name: Email daily summary
        if: ${{ env.MAIL_USERNAME != '' }}
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          html_body: file://email_body.html
          to: ${{ secrets.MAIL_TO != '' && secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: Trading Bot <${{ secrets.MAIL_USERNAME }}>

      - name: Commit signals + learning state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false
          # signals (always) + self-correction state (so learning persists)
          git add signals/ || true
          git add paper_trading/results/performance.csv 2>/dev/null || true
          git add paper_trading/results/summary.json 2>/dev/null || true
          git add paper_trading/results/track_record.md 2>/dev/null || true
          git add paper_trading/results/wl_processed.json 2>/dev/null || true
          git add paper_trading/stock_weights.json 2>/dev/null || true
          git add paper_trading/disabled_signals.json 2>/dev/null || true
          git add paper_trading/alpha_scores/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "signals: $(date -u +'%Y-%m-%d') auto-generated (real engine)"
          # Robust push: survive concurrent pushes from the weekly-review workflow
          for attempt in 1 2 3 4 5; do
            git fetch origin master
            git merge -X ours origin/master --no-edit || true
            if git push origin HEAD:master; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying..."
            sleep 5
          done
          echo "ERROR: could not push after 5 attempts" >&2
          exit 1

      - name: Email failure alert
        if: ${{ failure() && env.MAIL_USERNAME != '' }}
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[ALERT] Daily trading run FAILED — ${{ github.run_id }}"
          body: |
            The daily signal run failed today.
            Check the logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.MAIL_TO != '' && secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: Trading Bot <${{ secrets.MAIL_USERNAME }}>

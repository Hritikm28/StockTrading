name: Cloud Engine Diagnostic

# Runs the REAL multi_alpha_engine on GitHub's servers and commits a report
# (cloud_diagnostics/nse_access_report.json) back to the repo so we can read
# the result locally via `git pull`. Auto-runs whenever the diagnostic script
# or this workflow changes; can also be triggered manually.
on:
  push:
    paths:
      - 'cloud_engine_test.py'
      - '.github/workflows/engine_test.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lean engine dependencies
        run: pip install -r requirements_engine.txt

      - name: Run cloud engine diagnostic
        run: python cloud_engine_test.py
        continue-on-error: true

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud_diagnostics/
          git diff --cached --quiet || git commit -m "diagnostic: cloud engine report $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push

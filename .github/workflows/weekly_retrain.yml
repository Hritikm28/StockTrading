name: Weekly ML Retrain

# Retrains the pooled cross-sectional model (ml_predictor.py) on the freshest
# cached price data and commits it to models/ — so the daily run always
# predicts with a model at most a week old. Fully free, laptop can be off.
#
# Self-protecting: train_models() refuses to save if the validation rank IC
# is below threshold or the sample count is too small, so a bad data week can
# never silently replace a good model with a worse one.

on:
  schedule:
    - cron: '0 3 * * 6'   # Saturdays 03:00 UTC (08:30 IST), after Friday close
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute date key
        id: date
        run: echo "ymd=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Restore price-data cache
        uses: actions/cache@v4
        with:
          path: data/stocks
          key: stockdata-v3-${{ steps.date.outputs.ymd }}
          restore-keys: |
            stockdata-v3-

      - name: Install dependencies
        run: pip install -r requirements_engine.txt

      - name: Update market data
        run: python quick_update_data.py || true

      - name: Train pooled model
        run: python ml_predictor.py --train

      - name: Commit refreshed model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ || true
          if git diff --cached --quiet; then
            echo "Model unchanged (training gate refused or no improvement)."
            exit 0
          fi
          git commit -m "models: weekly pooled ML retrain $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3 4 5; do
            git fetch origin master
            git merge -X ours origin/master --no-edit || true
            if git push origin HEAD:master; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: could not push after 5 attempts" >&2
          exit 1

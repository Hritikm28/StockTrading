name: Weekly Strategy Review

on:
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run weekly review
        run: python weekly_review.py

      - name: Run correction-effectiveness report
        run: python weekly_correction_report.py || true

      - name: Commit review files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false
          git add signals/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "review: weekly $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3 4 5; do
            git fetch origin master
            git merge -X ours origin/master --no-edit || true
            if git push origin HEAD:master; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying..."
            sleep 5
          done
          echo "ERROR: could not push after 5 attempts" >&2
          exit 1

      - name: Email weekly correction report
        if: ${{ env.MAIL_USERNAME != '' && hashFiles('correction_email_body.html') != '' }}
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Weekly Correction Report — did the auto-corrections help?"
          html_body: file://correction_email_body.html
          to: ${{ secrets.MAIL_TO != '' && secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: Trading Bot <${{ secrets.MAIL_USERNAME }}>

      - name: Create GitHub Issue with review report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +'%Y-%m-%d')
          MD_FILE="signals/weekly_review_${TODAY}.md"
          if [ -f "$MD_FILE" ]; then
            gh issue create \
              --title "Weekly Review - ${TODAY}" \
              --body-file "$MD_FILE" \
              --label "weekly-review" || echo "Issue creation failed - label may not exist yet"
          else
            echo "No review file found for ${TODAY}"
          fi

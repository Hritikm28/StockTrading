name: Weekly Strategy Review

on:
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run weekly review
        run: python weekly_review.py

      - name: Commit review files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/
          git diff --cached --quiet || git commit -m "review: weekly $(date -u +'%Y-%m-%d')"
          git push

      - name: Create GitHub Issue with review report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +'%Y-%m-%d')
          MD_FILE="signals/weekly_review_${TODAY}.md"
          if [ -f "$MD_FILE" ]; then
            gh issue create \
              --title "Weekly Review - ${TODAY}" \
              --body-file "$MD_FILE" \
              --label "weekly-review" || echo "Issue creation failed - label may not exist yet"
          else
            echo "No review file found for ${TODAY}"
          fi
